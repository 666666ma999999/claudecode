name: notification
version: "1.0.0"
description: "Notification alerts and idle/permission prompts"
author: masaaki
enabled: true
routing:
  - triggers: ["通知設定", "アラート設定", "通知確認"]
    skill: notification-alert
hooks:
  Notification:
    - matcher: "idle_prompt"
      script: hooks/idle-notify.sh
    - matcher: "permission_prompt"
      script: hooks/permission-notify.sh
tags:
  - notification
