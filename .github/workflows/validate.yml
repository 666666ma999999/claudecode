name: Validate skills and hooks

on:
  push:
    branches: [main, master]
    paths:
      - 'skills/**'
      - 'hooks/**'
      - 'scripts/validate-skills-hooks.sh'
  pull_request:
    paths:
      - 'skills/**'
      - 'hooks/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install PyYAML
        run: python -m pip install --user pyyaml
      - name: Simulate HOME/.claude layout
        run: |
          mkdir -p $HOME/.claude
          ln -sf "$GITHUB_WORKSPACE/skills" $HOME/.claude/skills
          ln -sf "$GITHUB_WORKSPACE/hooks" $HOME/.claude/hooks
          ln -sf "$GITHUB_WORKSPACE/scripts" $HOME/.claude/scripts
      - name: Run validation
        run: bash scripts/validate-skills-hooks.sh
