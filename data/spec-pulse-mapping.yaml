# Spec Pulse: tag → M番号 マッピング辞書
# weekly_spec_pulse.sh が読み込み、P0/P1 イシューの tags から関連施策候補を自動付与
#
# 運用ルール:
#   - 「候補」明示・断定しない (誤紐付け時の信頼失墜を防ぐ)
#   - ☑ チェックは人間が手動 (Plan §3 Non-Goal 準拠)
#   - 新施策 M34+ 追加時は本ファイルを手動更新 (rules/05 plan.md/task.md の更新フローと同型)
#
# 配置: ~/.claude/data/spec-pulse-mapping.yaml
# 関連: ~/Desktop/prm/prime_suite/prime_ad/tasks/spec-pulse-plan.md §7

